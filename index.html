<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app">

        <section class="converter-container">
<div class="logo">
    <i class="fa-solid fa-money-bill-transfer"></i>
</div>            <h1>Currency Converter</h1>
            <p class="subtitle">
                Convert currencies instantly using live exchange rates.
            </p>

            <!-- From Currency -->
            <div class="input-container">

                <input
                    type="number"
                    class="amount"
                    min="1"
                    value="1"
                    placeholder="Enter Amount"
                >

                <select class="fromCurrency"></select>

            </div>

            <!-- Swap Icon -->
            <div class="swap-icon" title="Swap Currencies">
                <i class="fa-solid fa-right-left"></i>
            </div>

            <!-- To Currency -->
            <div class="input-container">

                <input
                    type="number"
                    class="convertedAmount"
                    placeholder="Converted Amount"
                    disabled
                >

                <select class="toCurrency"></select>

            </div>

            <!-- Result -->
          <div class="result-card">

    <h3>Conversion Result</h3>

    <div class="result">
        1 USD = 280.74 PKR
    </div>

    <p class="updated-time">
        Updated Just Now
    </p>

</div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
