<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Currency Converter App</title>
</head>
<body>
    <main>
        <section>
            <div class="converter-container">
                <h1>Currency Converter</h1>
                <div class="input-container">
                    <input type="number" value="1" min="1" class="amount">
                    <select class="fromCurrency" >
                      
                    </select>
                </div>
                <div class="arrow">
                ➜
                </div>
                <div class="input-container">
                    <input type="number" class="convertedAmount" disabled>
                    <select class="toCurrency" >
                        
                    </select>
                </div>
                <div class="result">1 USD = 280.74PKR</div>
            </div>
        </section>
    </main>
    


    <script src="script.js"></script>
</body>
</html>
